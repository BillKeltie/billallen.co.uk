<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bill Allen</title>

    <style>
        :root {
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --accent: #2563eb;
            --background: #f8fafc;
            --card-bg: #ffffff;
            --border: #e2e8f0;
            --link-border: #cbd5f5;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --text-primary: #e2e8f0;
                --text-secondary: #94a3b8;
                --accent: #60a5fa;
                --background: #0f172a;
                --card-bg: #1e293b;
                --border: #334155;
                --link-border: #475569;
            }
        }

        * {
            box-sizing: border-box;
        }

        /* ✅ Fade-in animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--background);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            color: var(--text-primary);

            /* ✅ Apply fade-in */
            animation: fadeIn 0.6s ease-out;
        }

        .card {
            text-align: center;
            padding: 40px 48px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            max-width: 420px;
            width: 90%;
        }

        h1 {
            margin: 0;
            font-size: 32px;
            font-weight: 600;
            letter-spacing: -0.4px;
        }

        .meta {
            margin-top: 8px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .divider {
            margin: 20px auto;
            width: 40px;
            height: 1px;
            background: var(--border);
        }

        .email {
            font-size: 14px;
        }

        a {
            text-decoration: none;
            color: var(--text-primary);
            border-bottom: 1px solid var(--link-border);
            padding-bottom: 2px;
            transition: all 0.2s ease;
        }

        a:hover {
            border-bottom: 1px solid var(--accent);
            color: var(--accent);
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Bill Allen</h1>
        <div class="meta">Blackpool, United Kingdom</div>

        <div class="divider"></div>

        <div class="email">
            <a href="mailto:bill@billallen.co.uk">bill@billallen.co.uk</a>
        </div>
    </div>
</body>
</html>
