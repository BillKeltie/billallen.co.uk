<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bill Allen</title>

    <style>
        :root {
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --accent: #2563eb;
            --background: #f8fafc;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: centre;
            align-items: centre;
            background: var(--background);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            color: var(--text-primary);
        }

        .card {
            text-align: centre;
            padding: 40px 48px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            max-width: 420px;
            width: 90%;
        }

        h1 {
            margin: 0;
            font-size: 32px;
            font-weight: 600;
            letter-spacing: -0.4px;
        }

        .meta {
            margin-top: 8px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .divider {
            margin: 20px auto;
            width: 40px;
            height: 1px;
            background: #e2e8f0;
        }

        .email {
            font-size: 14px;
        }

        a {
            text-decoration: none;
            color: var(--text-primary);
            border-bottom: 1px solid #cbd5f5;
            padding-bottom: 2px;
            transition: all 0.2s ease;
        }

        a:hover {
            border-bottom: 1px solid var(--accent);
            color: var(--accent);
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Bill Allen</h1>
        <div class="meta">Blackpool, United Kingdom</div>

        <div class="divider"></div>

        <div class="email">
            <a href="mailto:bill@billallen.co.uk">bill@billallen.co.uk</a>
        </div>
    </div>
</body>
</html>
